{% extends "Distribebidas/base.html" %}
{% block content %}
<div class="container my-4">
  <h2>Cambiar contraseña</h2>
  <form method="post" class="card p-4" style="background:#232323;">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-warning" type="submit">Actualizar contraseña</button>
    <a href="{% url 'Distribebidas:perfil' %}" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
{% endblock %}
